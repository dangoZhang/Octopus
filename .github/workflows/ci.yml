name: CI

on:
  push:
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo run -q -p octopus-core -- --version | grep -q "octopus 0.0.3"
      - run: cargo run -q -p octopus-core --example thinking_tentacle
      - run: cargo run -q -p octopus-core -- demo dangoZhang/Octopus | grep -q "Octopus demo"
      - run: cargo run -q -p octopus-core -- --json demo dangoZhang/Octopus | grep -q '"probe_summary"'
      - run: cargo run -q -p octopus-core -- providers | grep -q "openai"
      - run: |
          mkdir -p .octopus
          cargo run -q -p octopus-core -- provider status > .octopus/provider-status.txt
          grep -q "Provider status" .octopus/provider-status.txt
          cargo run -q -p octopus-core -- --json provider status > .octopus/provider-status.json
          grep -q '"layer": "tentacle_planning"' .octopus/provider-status.json
      - run: cargo run -q -p octopus-core -- provider local OCTOPUS_LOCAL | grep -q "OCTOPUS_LOCAL_BASE_URL"
      - run: |
          tmp=$(mktemp -d)
          cat > "$tmp/fake-curl" <<'SH'
          #!/bin/sh
          printf '%s' '{"choices":[{"message":{"content":"provider ok"}}]}'
          SH
          chmod +x "$tmp/fake-curl"
          OCTOPUS_LLM_MODEL=test-model OCTOPUS_LLM_BASE_URL=https://llm.example/v1 OCTOPUS_LLM_CURL="$tmp/fake-curl" cargo run -q -p octopus-core -- provider check | grep -q "Provider check: ok"
          OCTOPUS_LLM_MODEL=test-model OCTOPUS_LLM_BASE_URL=https://llm.example/v1 OCTOPUS_LLM_CURL="$tmp/fake-curl" cargo run -q -p octopus-core -- --json provider check | grep -q '"ok": true'
      - run: |
          tmp=$(mktemp -d)
          cargo install --path crates/octopus-core --bin octopus --root "$tmp/root"
          "$tmp/root/bin/octopus" demo dangoZhang/Octopus | grep -q "Octopus demo"
          "$tmp/root/bin/octopus" --state "$tmp/state.json" init | grep -q "Octopus init"
          grep -q installed_tentacles "$tmp/state.json"
          grep -q OCTOPUS_LLM_MANIFEST "$tmp/llm.env.example"
          "$tmp/root/bin/octopus" --state "$tmp/state.json" skills | grep -q "swe-workflow"
          "$tmp/root/bin/octopus" --state "$tmp/state.json" pet harness | grep -q "Octopus pet"
          "$tmp/root/bin/octopus" --state "$tmp/state.json" doctor | grep -q "Octopus doctor"
      - run: cargo run -q -p octopus-core -- catalog
      - run: cargo run -q -p octopus-core -- skills | grep -q "computer-use"
      - run: |
          cargo run -q -p octopus-core -- think computer-use-agent observe "current browser tab" | grep -q "selected_tool: browser_status"
          cargo run -q -p octopus-core -- think computer-use-agent observe "read clipboard" | grep -q "selected_tool: clipboard_read"
          cargo run -q -p octopus-core -- think computer-use-agent execute "copy octopus to clipboard" | grep -q "selected_tool: clipboard_write"
          cargo run -q -p octopus-core -- think swe-agent observe README.md | grep -q "actions:"
          cargo run -q -p octopus-core -- --json think swe-agent observe README.md | grep -q '"plan_source": "rule"'
      - run: |
          rm -rf .octopus/evolution/swe-agent
          tmp=$(mktemp -d)
          cargo run -q -p octopus-core -- --state "$tmp/state.json" install swe-agent
          cargo run -q -p octopus-core -- --state "$tmp/state.json" need observe . > /dev/null
          cargo run -q -p octopus-core -- --state "$tmp/state.json" evolve swe-agent improve | grep -q "feed traces: 1"
          grep -q "Recent Feed Traces" .octopus/evolution/swe-agent/PROPOSAL.md
          grep -q '"recent_feed_traces"' .octopus/evolution/swe-agent/proposal.json
          grep -q "tools/inspect_repo.sh" .octopus/evolution/swe-agent/proposal.json
          rm -rf .octopus/evolution/swe-agent
          cargo run -q -p octopus-core -- evolve swe-agent improve | grep -q "patch drafts:"
          grep -q runtime_code .octopus/evolution/swe-agent/PATCH_CANDIDATES.md
          grep -q "Patch Drafts" .octopus/evolution/swe-agent/PATCH_DRAFTS.md
          grep -q "authorization_required: true" .octopus/evolution/swe-agent/patches/03-runtime-code.patch.md
          cargo run -q -p octopus-core -- --state .octopus/apply-state.json evolve apply swe-agent runtime_code | grep -q "needs_authorization"
          cargo run -q -p octopus-core -- --state .octopus/apply-state.json oauth octopus evolve:swe-agent harness:write
          cargo run -q -p octopus-core -- --state .octopus/apply-state.json evolve apply swe-agent runtime_code > .octopus/apply-output.txt
          grep -q "ready_for_authorized_patch" .octopus/apply-output.txt
          grep -q "patch:" .octopus/apply-output.txt
          grep -q "diff --git" .octopus/evolution/swe-agent/apply/03-runtime-code.patch
          cargo run -q -p octopus-core -- --state .octopus/apply-state.json evolve score swe-agent 03-runtime-code satisfied "patch improved feed"
          grep -q "evolution_outcomes" .octopus/apply-state.json
          cargo run -q -p octopus-core -- --state .octopus/apply-state.json evolve recommend swe-agent next > .octopus/recommend-output.txt
          grep -q "recommended: 03-runtime-code" .octopus/recommend-output.txt
          grep -q "authorized: true" .octopus/evolution/swe-agent/apply/03-runtime-code.md
      - run: |
          cargo run -q -p octopus-core -- --json pet success | grep -q '"state": "success"'
          cargo run -q -p octopus-core -- pet harness | grep -q "pixel: 🟥"
      - run: |
          cargo run -q -p octopus-core -- manifests > .octopus/manifests.txt
          grep -q "surfaces=brain_prompt" .octopus/manifests.txt
      - run: cargo run -q -p octopus-core -- --lang zh env
      - run: python -m json.tool tentacles/tentacle.schema.json > /dev/null
      - run: python -m json.tool tentacles/swe-agent/manifest.json > /dev/null
      - run: python -m json.tool tentacles/computer-use-agent/manifest.json > /dev/null
      - run: python -m json.tool tentacles/bash-only/manifest.json > /dev/null
      - run: python -m json.tool tentacles/json-feed/manifest.json > /dev/null
      - run: python -m json.tool tentacles/visual/manifest.json > /dev/null
      - run: python -m json.tool tentacles/repo-maintainer/manifest.json > /dev/null
      - run: python3 -m py_compile tentacles/json-feed/tools/feed.py
      - run: grep -q '"surfaces"' tentacles/tentacle.schema.json
      - run: grep -q '"runtime_code"' tentacles/swe-agent/manifest.json
      - run: grep -q data-state docs/pet.html
      - run: grep -q "pixel-pet" docs/pet.html
      - run: grep -q "octopus think" docs/index.html
      - run: grep -q "octopus traces" docs/index.html
      - run: grep -q "Command Surface" docs/app.html
      - run: grep -q "data-run=\"think\"" docs/app.html
      - run: grep -q "data-run=\"traces\"" docs/app.html
      - run: grep -q "data-run=\"provider\"" docs/app.html
      - run: grep -q "/api/stream" docs/app.html
      - run: grep -q "/api/run" docs/architecture.md
      - run: cargo run -q -p octopus-core -- 2>&1 | grep -q "bridge \\[addr\\]"
      - run: grep -q "Next planned cleanup/version commit" docs/version-plan.md
      - run: grep -q "every later version tag" docs/real-machine-test.md
      - run: tentacles/swe-agent/tools/read.sh README.md 1 2 | grep -q "== read README.md:1-2 =="
      - run: tentacles/computer-use-agent/tools/browser_status.sh | python3 -m json.tool > /dev/null
      - run: tentacles/computer-use-agent/tools/window_status.sh | python3 -m json.tool > /dev/null
      - run: OCTOPUS_CLIPBOARD_DRY_RUN=1 tentacles/computer-use-agent/tools/clipboard_read.sh | python3 -m json.tool > /dev/null
      - run: printf octopus | OCTOPUS_CLIPBOARD_DRY_RUN=1 tentacles/computer-use-agent/tools/clipboard_write.sh | python3 -m json.tool > /dev/null
      - run: OCTOPUS_MCP_COMMAND=cat tentacles/computer-use-agent/tools/mcp.sh default echo '{"ok":true}' | python3 -m json.tool > /dev/null
      - run: tentacles/repo-maintainer/tools/inspect_repo.sh .
      - run: tentacles/repo-maintainer/tools/github_status.sh dangoZhang/Octopus | python -m json.tool > /dev/null
      - run: |
          tmp=$(mktemp -d)
          tentacles/repo-maintainer/tools/patch_queue.sh "$tmp" dangoZhang/Octopus "improve usability"
          grep -q "Patch Queue" "$tmp/.octopus/self-iteration/PATCH_QUEUE.md"
          tentacles/repo-maintainer/tools/draft_pr.sh "$tmp" dangoZhang/Octopus "improve usability"
          grep -q "Draft PR" "$tmp/.octopus/self-iteration/PR_DRAFT.md"
          OCTOPUS_PR_DRY_RUN=1 tentacles/repo-maintainer/tools/publish_pr.sh "$tmp" dangoZhang/Octopus octopus/improve-usability "Improve usability" "$tmp/.octopus/self-iteration/PR_DRAFT.md"
          grep -q '"mode": "dry-run"' "$tmp/.octopus/self-iteration/PR_PUBLISH.json"
      - run: |
          tmp=$(mktemp -d)
          printf 'echo bash-only-ok\n' | tentacles/bash-only/tools/write_and_run.sh "$tmp"
      - run: |
          tmp=$(mktemp -d)
          cargo run -q -p octopus-core -- --state "$tmp/state.json" install bash-only
          cargo run -q -p octopus-core -- --state "$tmp/state.json" need execute "echo blocked" | grep -q "needs_authorization"
          cargo run -q -p octopus-core -- --state "$tmp/state.json" oauth octopus tool:bash-only tool:execute
          cargo run -q -p octopus-core -- --state "$tmp/state.json" need execute "echo allowed" | grep -q "allowed"
      - run: |
          cargo run -q -p octopus-core -- --state .octopus/json-feed-state.json install json-feed
          cargo run -q -p octopus-core -- --state .octopus/json-feed-state.json need observe README.md | grep -q "json-feed observe"
      - run: |
          tmp=$(mktemp -d)
          cd "$tmp"
          cargo run -q --manifest-path "$GITHUB_WORKSPACE/Cargo.toml" -p octopus-core -- scaffold ci-feed python
          cargo run -q --manifest-path "$GITHUB_WORKSPACE/Cargo.toml" -p octopus-core -- manifests tentacles
          cargo run -q --manifest-path "$GITHUB_WORKSPACE/Cargo.toml" -p octopus-core -- probe ci-feed observe README.md | grep -q "status: Satisfied"
          cargo run -q --manifest-path "$GITHUB_WORKSPACE/Cargo.toml" -p octopus-core -- --state state.json install ci-feed
          cargo run -q --manifest-path "$GITHUB_WORKSPACE/Cargo.toml" -p octopus-core -- --state state.json need observe README.md | grep -q "observe feed"
          cargo run -q --manifest-path "$GITHUB_WORKSPACE/Cargo.toml" -p octopus-core -- scaffold native-feed rust
          cargo run -q --manifest-path "$GITHUB_WORKSPACE/Cargo.toml" -p octopus-core -- manifests tentacles | grep -q "native-feed"
          cargo run -q --manifest-path "$GITHUB_WORKSPACE/Cargo.toml" -p octopus-core -- manifests tentacles | grep -q "tools/feed"
      - run: |
          tmp=$(mktemp -d)
          cargo run -q -p octopus-core -- --state "$tmp/state.json" init
          grep -q OCTOPUS_LLM_MANIFEST "$tmp/llm.env.example"
          cargo run -q -p octopus-core -- --state "$tmp/state.json" adapt
          grep -q installed_tentacles "$tmp/state.json"
          cargo run -q -p octopus-core -- --state "$tmp/state.json" install research
          cargo run -q -p octopus-core -- --state "$tmp/state.json" install swe-agent
          cargo run -q -p octopus-core -- --state "$tmp/state.json" --json skills | grep -q '"installed": true'
          cargo run -q -p octopus-core -- --state "$tmp/state.json" installed
          cargo run -q -p octopus-core -- providers | grep -q "local"
          grep -q installed_tentacles "$tmp/state.json"
          cargo run -q -p octopus-core -- --state "$tmp/state.json" need observe . > "$tmp/observe.txt"
          test -s "$tmp/observe.txt"
          grep -q "feed_trace:" "$tmp/observe.txt"
          cargo run -q -p octopus-core -- --state "$tmp/state.json" traces > "$tmp/traces.txt"
          grep -q "Feed traces" "$tmp/traces.txt"
          cargo run -q -p octopus-core -- --state "$tmp/state.json" status | grep -q "feed_traces:"
          cargo run -q -p octopus-core -- --state "$tmp/state.json" --json need observe . > "$tmp/observe.json"
          grep -q '"status": "satisfied"' "$tmp/observe.json"
          grep -q '"plan"' "$tmp/observe.json"
          grep -q '"source": "tentacle_plan"' "$tmp/observe.json"
          grep -q '"feed_traces"' "$tmp/state.json"
          cargo run -q -p octopus-core -- --state "$tmp/state.json" pet | grep -q "state: success"
          cargo run -q -p octopus-core -- --state "$tmp/state.json" doctor | grep -q "Octopus doctor"
          cargo run -q -p octopus-core -- --state "$tmp/state.json" --json doctor | grep -q '"llm"'
          cargo run -q -p octopus-core -- --state "$tmp/state.json" chat "build octopus"
          cargo run -q -p octopus-core -- --state "$tmp/state.json" chat "make tools think"
          cargo run -q -p octopus-core -- --state "$tmp/state.json" beat 200
          cargo run -q -p octopus-core -- --state "$tmp/state.json" pet | grep -q "state: harness"
          cargo run -q -p octopus-core -- --state "$tmp/state.json" goal
          cargo run -q -p octopus-core -- --state "$tmp/state.json" self-iterate dangoZhang/Octopus
          cargo run -q -p octopus-core -- --state "$tmp/state.json" oauth github dangoZhang/Octopus
          cargo run -q -p octopus-core -- --state "$tmp/state.json" self-iterate dangoZhang/Octopus
          cargo run -q -p octopus-core -- --state "$tmp/state.json" --lang zh need remember "工具不进大脑"

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: PYTHONPATH=src python -m unittest discover -s tests -q
