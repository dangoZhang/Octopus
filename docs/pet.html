<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Octopus Pixel Pet</title>
    <meta name="description" content="A pixel Octopus pet that changes color for heartbeat, memory, harness, blocked, and success state." />
    <style>
      :root {
        color-scheme: light;
        --ink: #101318;
        --muted: #596070;
        --line: #d8dde6;
        --paper: #ffffff;
        --soft: #f5f7fa;
        --pet: #0f766e;
        --accent: #0f766e;
        --pixel: clamp(12px, 4.7vw, 24px);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--paper);
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0;
      }

      a {
        color: inherit;
      }

      .shell {
        width: min(920px, calc(100% - 32px));
        margin: 0 auto;
      }

      nav {
        min-height: 64px;
        border-bottom: 1px solid var(--line);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      .brand {
        font-size: 18px;
        font-weight: 800;
      }

      .links {
        display: flex;
        gap: 18px;
        color: var(--muted);
        font-size: 14px;
      }

      main {
        min-height: calc(100vh - 64px);
        display: grid;
        align-items: center;
        padding: 48px 0;
      }

      .stage {
        display: grid;
        grid-template-columns: minmax(260px, 1fr) minmax(260px, 360px);
        gap: 32px;
        align-items: center;
      }

      .pet-wrap {
        display: grid;
        place-items: center;
        min-height: 430px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--soft);
      }

      .pixel-pet {
        display: grid;
        grid-template-columns: repeat(15, var(--pixel));
        grid-auto-rows: var(--pixel);
        gap: 2px;
        image-rendering: pixelated;
      }

      .pixel {
        width: var(--pixel);
        height: var(--pixel);
        border-radius: 2px;
      }

      .pixel.body {
        background: var(--pet);
        box-shadow: inset 0 -3px 0 rgba(0, 0, 0, 0.12);
      }

      .pixel.eye {
        background: #ffffff;
        box-shadow: inset 0 -3px 0 rgba(0, 0, 0, 0.14);
      }

      .pixel.eye::after {
        content: "";
        display: block;
        width: 40%;
        height: 40%;
        margin: 30%;
        border-radius: 2px;
        background: var(--ink);
      }

      .state {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 22px;
      }

      h1 {
        margin: 0;
        font-size: 38px;
        line-height: 1;
        letter-spacing: 0;
      }

      .fallback {
        margin: 12px 0 0;
        font-size: 28px;
      }

      .label {
        margin: 14px 0 22px;
        color: var(--muted);
        line-height: 1.55;
      }

      .swatches {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      button {
        min-height: 44px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--paper);
        color: var(--ink);
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      button[aria-pressed="true"] {
        border-color: var(--ink);
        box-shadow: inset 0 -4px 0 var(--accent);
      }

      @media (max-width: 760px) {
        .stage {
          grid-template-columns: 1fr;
        }

        .pet-wrap {
          min-height: 320px;
        }

        h1 {
          font-size: 32px;
        }
      }
    </style>
  </head>
  <body data-state="heartbeat">
    <nav class="shell">
      <div class="brand">Octopus 🐙</div>
      <div class="links">
        <a href="./">Home</a>
        <a href="./app.html">App</a>
        <a href="https://github.com/dangoZhang/Octopus">GitHub</a>
      </div>
    </nav>

    <main class="shell">
      <div class="stage">
        <div class="pet-wrap" aria-label="Octopus pixel pet">
          <div class="pixel-pet" id="pixel-pet" aria-hidden="true"></div>
        </div>

        <section class="state" aria-live="polite">
          <h1 id="state-title">Heartbeat</h1>
          <div class="fallback" id="fallback" aria-label="chat fallback">🟩 🐙</div>
          <p class="label" id="state-label">Kernel and chat loop are alive.</p>
          <div class="swatches">
            <button type="button" data-state="heartbeat">Heartbeat</button>
            <button type="button" data-state="memory">Memory</button>
            <button type="button" data-state="harness">Harness</button>
            <button type="button" data-state="blocked">Blocked</button>
            <button type="button" data-state="success">Success</button>
          </div>
        </section>
      </div>
    </main>

    <script>
      const octopusPixels = [
        ".....bbbbb.....",
        "...bbbbbbbbb...",
        "..bbbbbbbbbbb..",
        ".bbbbbbbbbbbbb.",
        ".bbbbebbbebbbb.",
        ".bbbbbbbbbbbbb.",
        "..bbbbbbbbbbb..",
        "...bbbbbbbbb...",
        "..bb.bbb.bb....",
        ".bb..bbb..bb...",
        "bb...b.b...bb..",
        "b....b.b....b.."
      ];

      const states = {
        heartbeat: ["Heartbeat", "Kernel and chat loop are alive.", "#0f766e", "🟩"],
        memory: ["Memory beat", "Context was recalled, compacted, or forgotten.", "#6d5bd0", "🟪"],
        harness: ["Harness beat", "Routes or tools are adapting from feedback.", "#cf4d32", "🟥"],
        blocked: ["Blocked", "The harness needs a grant or external change.", "#a16207", "🟨"],
        success: ["Success", "Feedback returned useful evidence.", "#16833a", "🟩"]
      };

      const pet = document.querySelector("#pixel-pet");
      const title = document.querySelector("#state-title");
      const label = document.querySelector("#state-label");
      const fallback = document.querySelector("#fallback");
      const buttons = [...document.querySelectorAll("[data-state]")];

      function drawPet() {
        pet.replaceChildren();
        octopusPixels.join("").split("").forEach((pixel) => {
          const block = document.createElement("span");
          block.className = pixel === "b" ? "pixel body" : pixel === "e" ? "pixel eye" : "pixel";
          pet.appendChild(block);
        });
      }

      function setState(name) {
        const state = states[name] || states.heartbeat;
        document.body.dataset.state = name;
        document.documentElement.style.setProperty("--pet", state[2]);
        document.documentElement.style.setProperty("--accent", state[2]);
        title.textContent = state[0];
        label.textContent = state[1];
        fallback.textContent = `${state[3]} 🐙`;
        buttons.forEach((button) => {
          button.setAttribute("aria-pressed", String(button.dataset.state === name));
        });
      }

      drawPet();
      const initial = new URLSearchParams(window.location.search).get("state") || "heartbeat";
      buttons.forEach((button) => button.addEventListener("click", () => setState(button.dataset.state)));
      setState(initial);
    </script>
  </body>
</html>
