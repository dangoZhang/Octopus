<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Octopus App</title>
    <meta name="description" content="A one-page Octopus surface for Goal, Need, Feed, pet state, and output." />
    <style>
      :root {
        color-scheme: light;
        --ink: #101318;
        --muted: #626b78;
        --line: #d9dee7;
        --paper: #ffffff;
        --wash: #f5f7fa;
        --aqua: #0f766e;
        --blue: #2563eb;
        --amber: #a16207;
        --red: #b93827;
        --violet: #6d5bd0;
        --shadow: 0 18px 42px rgba(17, 24, 39, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      [hidden] {
        display: none !important;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(180deg, rgba(245, 247, 250, 0.9), rgba(255, 255, 255, 0) 340px),
          var(--paper);
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0;
      }

      a {
        color: inherit;
      }

      button,
      textarea {
        font: inherit;
      }

      button {
        min-height: 42px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: #fff;
        color: var(--ink);
        cursor: pointer;
        padding: 0 18px;
      }

      button.primary {
        border-color: var(--aqua);
        background: var(--aqua);
        color: #fff;
      }

      button:disabled {
        cursor: wait;
        opacity: 0.6;
      }

      textarea {
        width: 100%;
        min-height: 172px;
        border: 0;
        border-radius: 0;
        background: transparent;
        color: var(--ink);
        resize: vertical;
        font-size: 22px;
        line-height: 1.42;
        outline: none;
      }

      textarea::placeholder {
        color: #99a1ad;
      }

      main {
        width: min(1180px, calc(100% - 32px));
        margin: 0 auto;
      }

      main {
        padding: 28px 0 36px;
      }

      .mast {
        display: grid;
        grid-template-columns: minmax(0, 1fr);
        gap: 16px;
        align-items: start;
        margin-bottom: 18px;
      }

      h1 {
        margin: 0;
        font-size: 34px;
        line-height: 1.1;
        letter-spacing: 0;
      }

      h2 {
        margin: 0;
        font-size: 15px;
      }

      .status {
        color: var(--muted);
        font-size: 13px;
        margin-top: 6px;
      }

      .app {
        display: grid;
        grid-template-columns: 280px minmax(0, 1fr) 310px;
        gap: 16px;
        align-items: stretch;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.94);
        box-shadow: var(--shadow);
      }

      .pet-panel {
        display: grid;
        align-content: space-between;
        gap: 18px;
        min-height: 390px;
        padding: 18px;
      }

      .pet-stage {
        min-height: 230px;
        display: grid;
        place-items: center;
        border-radius: 8px;
        background: var(--wash);
      }

      .pixel-pet {
        --pet: var(--blue);
        width: 176px;
        height: 176px;
        display: grid;
        grid-template-columns: repeat(12, 1fr);
        grid-template-rows: repeat(12, 1fr);
        gap: 2px;
        padding: 12px;
        animation: breathe 2.6s ease-in-out infinite;
      }

      .pixel-pet span {
        border-radius: 3px;
      }

      .pixel-pet .body {
        background: var(--pet);
      }

      .pixel-pet .head {
        background: var(--head, var(--pet));
      }

      .pixel-pet .tentacle {
        transform-origin: 50% 0;
      }

      .pixel-pet .eye {
        background: #fff;
        box-shadow: inset 0 0 0 2px #111318;
      }

      .pixel-pet .shadow {
        background: color-mix(in srgb, var(--pet), #111 20%);
      }

      @keyframes breathe {
        0%, 100% {
          transform: translateY(0) scale(1);
        }
        50% {
          transform: translateY(-5px) scale(1.03);
        }
      }

      .pixel-pet[data-state="need"] .head {
        animation: pet-head-signal 1s ease-in-out infinite;
      }

      .pixel-pet[data-state="action"] .tentacle,
      .pixel-pet[data-state="action"] .shadow {
        animation: pet-tentacle-wave 0.72s ease-in-out infinite alternate;
      }

      .pixel-pet[data-state="feed"] .body,
      .pixel-pet[data-state="success"] .body {
        animation: pet-feed-glow 1.1s ease-in-out infinite;
      }

      .pixel-pet[data-state="harness"],
      .pixel-pet[data-state="evolution"] {
        animation: pet-evolve-breathe 1.4s ease-in-out infinite;
      }

      .pixel-pet[data-state="blocked"],
      .pixel-pet[data-state="failed"] {
        animation: pet-blocked-shake 0.42s steps(2, end) infinite;
      }

      @keyframes pet-head-signal {
        0%, 100% {
          filter: saturate(1);
        }
        50% {
          filter: saturate(1.6) brightness(1.08);
        }
      }

      @keyframes pet-tentacle-wave {
        from {
          transform: translateY(0) rotate(-4deg);
        }
        to {
          transform: translateY(5px) rotate(5deg);
        }
      }

      @keyframes pet-feed-glow {
        0%, 100% {
          filter: brightness(1);
        }
        50% {
          filter: brightness(1.2);
        }
      }

      @keyframes pet-evolve-breathe {
        0%, 100% {
          transform: translateY(0) scale(1);
        }
        50% {
          transform: translateY(-7px) scale(1.04);
        }
      }

      @keyframes pet-blocked-shake {
        0%, 100% {
          transform: translateX(0);
        }
        50% {
          transform: translateX(5px);
        }
      }

      .pet-copy strong,
      .signal strong,
      .output-item strong {
        display: block;
        margin-bottom: 6px;
      }

      .pet-copy span,
      .signal span,
      .output-item span {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.5;
        overflow-wrap: anywhere;
      }

      .goal-panel {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) auto;
        min-height: 390px;
        padding: 20px;
      }

      .goal-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding-bottom: 12px;
        border-bottom: 1px solid var(--line);
      }

      .goal-label {
        color: var(--muted);
        font-size: 13px;
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        padding-top: 14px;
        border-top: 1px solid var(--line);
      }

      .signals {
        display: grid;
        gap: 16px;
      }

      .signal {
        min-height: 187px;
        padding: 16px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
      }

      .signal.need {
        border-top: 4px solid var(--blue);
      }

      .signal.feed {
        border-top: 4px solid var(--aqua);
      }

      .output-panel {
        margin-top: 16px;
        padding: 18px;
      }

      .output-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 12px;
      }

      .output-list {
        display: grid;
        gap: 10px;
      }

      .output-item {
        border: 1px solid var(--line);
        border-left: 4px solid var(--line);
        border-radius: 8px;
        background: var(--wash);
        padding: 12px;
      }

      .output-item.pass {
        border-left-color: var(--aqua);
      }

      .output-item.warn {
        border-left-color: var(--amber);
      }

      .output-item.environment {
        border-left-color: var(--blue);
      }

      .output-item.fail {
        border-left-color: var(--red);
      }

      @media (max-width: 980px) {
        .app {
          grid-template-columns: 1fr;
        }

        .pet-panel,
        .goal-panel {
          min-height: auto;
        }

        .signals {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

      }

      @media (max-width: 720px) {
        main {
          width: min(100% - 24px, 1180px);
        }

        .mast {
          grid-template-columns: 1fr;
          align-items: start;
        }

        .signals {
          grid-template-columns: 1fr;
        }

        h1 {
          font-size: 29px;
        }

        textarea {
          font-size: 19px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="mast">
        <div>
          <h1>Octopus</h1>
          <div class="status" id="statusLine">Local Octopus · waiting</div>
        </div>
      </section>

      <section class="app">
        <aside class="panel pet-panel">
          <div class="pet-stage">
            <div class="pixel-pet" id="pixelPet" aria-label="Octopus pixel pet"></div>
          </div>
          <div class="pet-copy" id="petText">
            <strong>Waiting</strong>
            <span>Give it a goal. Need and Feed stay visible.</span>
          </div>
        </aside>

        <section class="panel goal-panel">
          <div class="goal-top">
            <h2>Goal</h2>
            <span class="goal-label">one clear target</span>
          </div>
          <textarea id="goal" placeholder="What should Octopus work toward?"></textarea>
          <div>
            <div class="controls">
              <button class="primary" type="button" id="send">Send</button>
            </div>
          </div>
        </section>

        <section class="signals">
          <article class="signal need" id="needCard">
            <strong>Current Need</strong>
            <span>No Need yet.</span>
          </article>
          <article class="signal feed" id="feedCard">
            <strong>Current Feed</strong>
            <span>No Feed yet.</span>
          </article>
        </section>
      </section>

      <section class="panel output-panel">
        <div class="output-head">
          <h2>Output</h2>
          <span class="status" id="outputStatus">quiet</span>
        </div>
        <div class="output-list" id="outputList">
          <div class="output-item warn">
            <strong>Waiting</strong>
            <span>Run Octopus locally.</span>
          </div>
        </div>
      </section>
    </main>

    <script>
      const $ = (id) => document.getElementById(id);
      let statePath = ".octopus/state.json";
      const storageKeys = {
        goal: "octopus.app.goal"
      };
      let lastStatus = null;
      const petMap = [
        "....BBBB....",
        "...BBBBBB...",
        "..BBBBBBBB..",
        "..BBEBBEBB..",
        ".BBBBBBBBBB.",
        ".BBBBBBBBBB.",
        "..BBBBBBBB..",
        ".SBBBBBBBBS.",
        "SS.BBBBBB.SS",
        "S..SB..BS..S",
        "S..S....S..S",
        ".SS......SS."
      ];
      const colors = {
        heartbeat: "#0f766e",
        need: "#f973a9",
        action: "#f59e0b",
        feed: "#22a06b",
        memory: "#6d5bd0",
        harness: "#2563eb",
        evolution: "#2563eb",
        success: "#16833a",
        blocked: "#b93827",
        failed: "#b93827",
        partial: "#2563eb",
        waiting: "#2563eb"
      };

      const headColors = {
        need: "#ff4f8b",
        action: "#f97316",
        feed: "#16a34a",
        harness: "#4f8cff",
        evolution: "#4f8cff",
        blocked: "#dc2626",
        failed: "#dc2626"
      };

      function defaultBridge() {
        const local = ["localhost", "127.0.0.1", "::1", ""].includes(location.hostname);
        return location.protocol.startsWith("http") && local ? location.origin : "http://127.0.0.1:8765";
      }

      function baseArgs() {
        return ["--state", statePath, "--json"];
      }

      async function loadBridgeConfig() {
        try {
          const response = await fetch(defaultBridge().replace(/\/$/, "") + "/api/config");
          if (!response.ok) return;
          const config = await response.json();
          if (config && config.state_path) {
            statePath = config.state_path;
          }
        } catch (_) {
          // File preview fallback keeps the default local state path.
        }
      }

      function goalText() {
        return $("goal").value.trim();
      }

      function readStored(key) {
        try {
          return localStorage.getItem(key) || "";
        } catch (_) {
          return "";
        }
      }

      function writeStored(key, value) {
        try {
          if (value) localStorage.setItem(key, value);
          else localStorage.removeItem(key);
        } catch (_) {
          // Storage can be disabled in private windows; the app still works without it.
        }
      }

      function hydrateInputs() {
        const goal = readStored(storageKeys.goal);
        if (goal) $("goal").value = goal;
      }

      function persistInputs() {
        writeStored(storageKeys.goal, goalText());
      }

      function setBusy(busy) {
        document.querySelectorAll("button").forEach((button) => {
          button.disabled = busy;
        });
        if (busy) drawPet("action");
      }

      function setStatus(text) {
        $("statusLine").textContent = text;
      }

      function setOutputStatus(text) {
        $("outputStatus").textContent = text;
      }

      function drawPet(state = "waiting") {
        const root = $("pixelPet");
        root.textContent = "";
        root.dataset.state = state;
        root.style.setProperty("--pet", colors[state] || colors.waiting);
        root.style.setProperty("--head", headColors[state] || colors[state] || colors.waiting);
        for (let row = 0; row < petMap.length; row += 1) {
          for (let col = 0; col < petMap[row].length; col += 1) {
            const cell = document.createElement("span");
            const kind = petMap[row][col];
            if (kind === "E") cell.className = "eye head";
            else if (kind === "S") cell.className = "shadow tentacle";
            else if (kind === "B") cell.className = `body ${row <= 6 ? "head" : ""} ${row >= 8 ? "tentacle" : ""}`.trim();
            cell.style.animationDelay = `${(row + col) * 24}ms`;
            root.appendChild(cell);
          }
        }
      }

      function setBlock(id, title, text, status = "") {
        const node = $(id);
        node.textContent = "";
        const strong = document.createElement("strong");
        strong.textContent = title;
        const span = document.createElement("span");
        span.textContent = text || "None yet.";
        node.append(strong, span);
        if (id === "needCard") node.className = "signal need";
        if (id === "feedCard") node.className = "signal feed";
        if (status) node.dataset.status = status;
      }

      function output(title, text, tone = "") {
        const item = document.createElement("div");
        item.className = `output-item ${tone}`.trim();
        const strong = document.createElement("strong");
        strong.textContent = title;
        const span = document.createElement("span");
        span.textContent = text || "";
        item.append(strong, span);
        $("outputList").prepend(item);
        while ($("outputList").children.length > 6) {
          $("outputList").lastElementChild.remove();
        }
      }

      function replaceOutput(title, text, tone = "") {
        $("outputList").textContent = "";
        output(title, text, tone);
      }

      async function runJson(args) {
        const response = await fetch(defaultBridge().replace(/\/$/, "") + "/api/run", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ args })
        });
        const result = await response.json();
        if (!result.ok) {
          throw new Error(result.stderr || result.stdout || result.policy || "Octopus command failed");
        }
        return JSON.parse(result.stdout || "{}");
      }

      function goalStatus(goal) {
        return String((goal || {}).status || "").toLowerCase();
      }

      function queuedNeedContext(queued) {
        const context = (queued || {}).context || {};
        const parts = [];
        if (context.field_pack) parts.push(`field=${context.field_pack}`);
        if (context.field_mini_task) parts.push(`task=${context.field_mini_task}`);
        return parts.join(" · ");
      }

      function freshPetEvent(event) {
        const timestamp = Number((event || {}).timestamp_secs || 0);
        if (!timestamp) return false;
        const age = Date.now() / 1000 - timestamp;
        return age >= 0 && age <= 300;
      }

      function applyStatus(report) {
        const event = report.last_pet_event || {};
        const eventFresh = freshPetEvent(event);
        const goal = report.goal || {};
        const queued = report.latest_need_queue_item;
        const queuedStatus = String((queued || {}).status || "").toLowerCase();
        const hasPendingNeed = Boolean(queued && queued.need && queuedStatus === "pending");
        const queuedContext = queuedNeedContext(queued);
        const queuedText = queued && queued.need ? [queued.need.query, queuedContext].filter(Boolean).join(" · ") : "";
        const trace = report.latest_feed_trace;
        const petState = goalStatus(goal) === "blocked"
          ? "blocked"
          : (hasPendingNeed ? "need" : (eventFresh && event.state ? event.state : (trace ? "feed" : "heartbeat")));
        drawPet(petState);
        setBlock("petText", petState, hasPendingNeed ? (queuedText || "Pending Need") : (eventFresh ? (event.summary || event.source || "Connected.") : "Connected."));
        if (goal.objective) $("goal").value = goal.objective;

        if (hasPendingNeed) {
          setBlock("needCard", queued.need.kind || "Need", queuedText || queued.status || "Pending Need");
        } else if (trace) {
          setBlock("needCard", trace.need_kind || "Need", trace.need_query || "Need supplied by latest Feed");
        } else {
          setBlock("needCard", "Current Need", "No Need yet.");
        }

        if (trace) {
          const via = [trace.tentacle, trace.tool].filter(Boolean).join(" / ");
          setBlock("feedCard", trace.status || "Feed", `${trace.summary || trace.need_query || "Feed trace"}${via ? " · " + via : ""}`);
        } else {
          setBlock("feedCard", "Current Feed", "No Feed yet.");
        }
      }

      function latestFeedText(report) {
        const feed = report.feed && report.feed.feeds && report.feed.feeds[0];
        if (feed) {
          const need = feed.need || {};
          const kind = need.kind || "Need";
          const query = need.query ? ` ${need.query}` : "";
          return `${kind}${query} -> ${feed.status || "Feed"}: ${feed.summary || "Feed returned."}`;
        }
        const trace = report.latest_feed_trace;
        if (trace) {
          const via = [trace.tentacle, trace.tool].filter(Boolean).join(" / ");
          const suffix = via ? ` via ${via}` : "";
          return `${trace.need_kind || "Need"} -> ${trace.status || "Feed"}${suffix}: ${trace.summary || trace.need_query || "Feed trace recorded."}`;
        }
        return "";
      }

      function statusText(report) {
        const pool = report.field_pool;
        if (pool && Array.isArray(pool.slots)) {
          const active = pool.active_slot_field || "none";
          const policy = pool.worker_slots || pool.policy || "workers are execution slots";
          const fieldSlots = pool.field_slot_count || pool.field_count || pool.slots.length;
          const workerSlots = pool.latest_worker_slot_count || 0;
          const reason = pool.active_slot_reason ? ` Reason=${pool.active_slot_reason}.` : "";
          const recent = recentFieldPoolActivity(pool);
          const runDetail = parallelRunStatusText(report.latest_parallel_evolution_run, workerSlots);
          return `Field pool: ${fieldSlots} peer slots, worker slots=${workerSlots}, ${pool.completed_fields || 0} complete, active=${active}.${reason} ${policy}.${runDetail}${recent}`;
        }
        const hasFeed = Number(report.feed_trace_count || 0) > 0;
        return hasFeed ? "Ready. Latest Feed is visible." : "Ready. Give Octopus a goal.";
      }

      function statusHasEnvironmentGap(report) {
        const pool = (report || {}).field_pool || {};
        const slots = Array.isArray(pool.slots) ? pool.slots : [];
        return slots.some((slot) => slot.needs_environment && !slot.completed)
          || String(pool.active_slot_reason || "").toLowerCase().includes("environment");
      }

      function environmentGapText(productReport, statusReport) {
        const gaps = Array.isArray((productReport || {}).gaps) ? productReport.gaps : [];
        const runtime = (productReport || {}).runtime || {};
        const pool = (productReport || {}).field_pool || (statusReport || {}).field_pool || {};
        const slots = Array.isArray(pool.slots) ? pool.slots : [];
        const environmentSlot = slots.find((slot) => slot.needs_environment && !slot.completed)
          || (String(pool.active_slot_reason || "").toLowerCase().includes("environment")
            ? { field: pool.active_slot_field || "field" }
            : null);
        const gap = gaps.find((item) => item.id === "go_runtime_missing")
          || gaps.find((item) => String(item.id || "").includes("environment"));
        if (!environmentSlot && !gap) return "";
        const field = environmentSlot && environmentSlot.field ? environmentSlot.field : "field";
        const task = environmentSlot && (environmentSlot.latest_mini_task || environmentSlot.next_mini_task);
        const subject = task ? `${field}/${task}` : field;
        const reason = gap && gap.impact ? gap.impact : (pool.active_slot_reason || "Runtime environment needs attention.");
        const runtimeLine = runtime.go_ready === false && runtime.message ? ` ${runtime.message}.` : "";
        return `${subject}: ${reason}.${runtimeLine} Feed should stay partial until the runtime is available or real fallback evidence exists.`;
      }

      function parallelRunStatusText(run, activeWorkerSlots) {
        if (!run) return "";
        const requested = Number(run.requested_worker_count || run.worker_count || activeWorkerSlots || 0);
        const active = Number(run.worker_count || activeWorkerSlots || 0);
        const candidates = Array.isArray(run.candidate_fields) ? run.candidate_fields.filter(Boolean) : [];
        if (!requested && candidates.length === 0) return "";
        const candidateText = candidates.length ? candidates.join(", ") : "all peer fields";
        return ` Run requested=${requested}, active=${active}, candidates=${candidateText}.`;
      }

      function recentFieldPoolActivity(pool) {
        const slots = Array.isArray(pool.slots) ? pool.slots : [];
        const latest = slots
          .map((slot) => ({
            worker: slot.latest_worker_id || "",
            field: slot.field || "field",
            task: slot.latest_mini_task || slot.next_mini_task || "done",
            status: slot.latest_status || slot.latest_worker_status || "unknown",
            updatedAt: Number(slot.latest_updated_at_secs || 0),
          }))
          .filter((slot) => slot.updatedAt > 0)
          .sort((a, b) => b.updatedAt - a.updatedAt)[0];
        if (!latest) return "";
        const age = Math.max(0, Math.floor(Date.now() / 1000 - latest.updatedAt));
        const worker = latest.worker ? `${latest.worker} ` : "";
        return ` Last activity=${worker}${latest.field}/${latest.task} ${latest.status} ${age}s ago.`;
      }

      async function refresh(options = {}) {
        const replace = options.replaceOutput !== false;
        setBusy(true);
        setStatus("checking...");
        setOutputStatus("checking");
        try {
          const report = await runJson([...baseArgs(), "status"]);
          let productReport = null;
          if (statusHasEnvironmentGap(report)) {
            try {
              productReport = await runJson([...baseArgs(), "report"]);
            } catch (_) {
              productReport = null;
            }
          }
          lastStatus = report;
          applyStatus(report);
          if (replace) {
            const environmentText = environmentGapText(productReport, report);
            const feedText = latestFeedText(report);
            if (environmentText) {
              replaceOutput("Environment gap", environmentText, "environment");
            } else {
              replaceOutput(feedText ? "Latest Feed" : "Connected", feedText || statusText(report), "pass");
            }
          }
          setStatus("Local Octopus · connected");
          setOutputStatus("ready");
        } catch (error) {
          drawPet("waiting");
          setBlock("petText", "Waiting", "Give it a goal. Need and Feed stay visible.");
          setBlock("needCard", "Current Need", "No local state.");
          setBlock("feedCard", "Current Feed", "No local state.");
          if (replace) replaceOutput("Not connected", "Run octopus start --open.", "warn");
          setStatus("Local Octopus · not connected");
          setOutputStatus("offline");
        } finally {
          setBusy(false);
        }
      }

      async function act(label, args, done) {
        setBusy(true);
        setStatus(`${label}...`);
        setOutputStatus("working");
        try {
          const report = await runJson(args);
          if (done) done(report);
          drawPet("feed");
          output(label, summarize(report), "pass");
          setStatus(`${label} complete`);
          setOutputStatus("ready");
          await refresh({ replaceOutput: false });
        } catch (error) {
          output(label, String(error), "fail");
          setStatus(`${label} failed`);
          setOutputStatus("error");
        } finally {
          setBusy(false);
        }
      }

      function summarize(report) {
        const feedText = latestFeedText(report);
        if (feedText) return feedText;
        if (report.summary) return report.summary;
        if (report.objective) return report.objective;
        if (report.goal && report.goal.objective) return report.goal.objective;
        if (report.feedback && report.feedback.summary) return report.feedback.summary;
        return "Done.";
      }

      function sendGoal() {
        const goal = goalText();
        if (!goal) {
          output("Goal needed", "Write one clear target first.", "warn");
          setStatus("waiting for goal");
          setOutputStatus("waiting");
          return;
        }
        const hasFeed = lastStatus && Number(lastStatus.feed_trace_count || 0) > 0;
        const args = hasFeed
          ? [...baseArgs(), "chat", goal]
          : [...baseArgs(), "first-run", goal];
        return act("Sent", args, (report) => {
          if (report.feed && report.feed.feeds && report.feed.feeds[0]) {
            const feed = report.feed.feeds[0];
            const need = feed.need || {};
            setBlock("needCard", need.kind || "Need", need.query || "Need supplied.");
            setBlock("feedCard", feed.status || "Feed", feed.summary || "Feed returned.");
          }
        });
      }

      async function runStartupSnapshot() {
        await loadBridgeConfig();
        refresh();
      }

      function bind() {
        hydrateInputs();
        drawPet("waiting");
        $("goal").addEventListener("input", persistInputs);
        $("send").addEventListener("click", sendGoal);
      }

      bind();
      runStartupSnapshot();
    </script>
  </body>
</html>
