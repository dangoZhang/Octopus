<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Octopus App</title>
    <meta name="description" content="Native HTML command surface for Octopus." />
    <style>
      :root {
        color-scheme: light;
        --ink: #111318;
        --muted: #5b6472;
        --line: #d9dee7;
        --paper: #ffffff;
        --soft: #f5f7fa;
        --teal: #0f766e;
        --coral: #c94f38;
        --violet: #6d5bd0;
        --gold: #a16207;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--paper);
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0;
      }

      a {
        color: inherit;
      }

      .shell {
        width: min(1180px, calc(100% - 32px));
        margin: 0 auto;
      }

      header {
        border-bottom: 1px solid var(--line);
      }

      nav {
        min-height: 64px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      .brand {
        font-weight: 800;
      }

      .links {
        display: flex;
        gap: 16px;
        color: var(--muted);
        font-size: 14px;
      }

      main {
        padding: 28px 0 44px;
      }

      h1 {
        margin: 0 0 18px;
        font-size: 36px;
        line-height: 1.08;
        letter-spacing: 0;
      }

      h2 {
        margin: 0 0 14px;
        font-size: 18px;
      }

      label {
        display: grid;
        gap: 6px;
        color: var(--muted);
        font-size: 13px;
      }

      input,
      select,
      textarea {
        width: 100%;
        min-height: 42px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #fff;
        color: var(--ink);
        padding: 10px 12px;
        font: inherit;
      }

      textarea {
        min-height: 90px;
        resize: vertical;
      }

      button {
        min-height: 38px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #fff;
        color: var(--ink);
        font: inherit;
        cursor: pointer;
      }

      button.primary {
        border-color: var(--teal);
        background: var(--teal);
        color: #fff;
      }

      .grid {
        display: grid;
        grid-template-columns: minmax(280px, 0.9fr) minmax(360px, 1.1fr);
        gap: 18px;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 18px;
      }

      .stack {
        display: grid;
        gap: 14px;
      }

      .row {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .toolbar button {
        padding: 0 12px;
      }

      .states button[data-state="heartbeat"] {
        border-color: var(--teal);
      }

      .states button[data-state="memory"] {
        border-color: var(--violet);
      }

      .states button[data-state="harness"] {
        border-color: var(--gold);
      }

      .states button[data-state="blocked"] {
        border-color: var(--coral);
      }

      pre {
        min-height: 260px;
        margin: 0;
        overflow: auto;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--soft);
        padding: 16px;
      }

      code {
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
        font-size: 13px;
        line-height: 1.6;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .status {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
      }

      .beat {
        border-top: 4px solid var(--teal);
        background: var(--soft);
        border-radius: 8px;
        padding: 12px;
      }

      .beat:nth-child(2) {
        border-top-color: var(--violet);
      }

      .beat:nth-child(3) {
        border-top-color: var(--gold);
      }

      .beat strong {
        display: block;
        margin-bottom: 4px;
      }

      .beat span {
        color: var(--muted);
        font-size: 13px;
      }

      .output pre {
        min-height: 180px;
      }

      .install-report {
        border-top: 1px solid var(--line);
        padding-top: 14px;
      }

      .report-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .metric {
        background: var(--soft);
        border-radius: 8px;
        padding: 10px;
      }

      .metric strong {
        display: block;
        margin-bottom: 4px;
      }

      .metric span,
      .report-list li {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.45;
      }

      .report-list {
        display: grid;
        gap: 8px;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .report-list li {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 10px;
      }

      .report-list button {
        margin-top: 8px;
        padding: 0 10px;
      }

      .check-command {
        display: inline;
        color: var(--ink);
      }

      details {
        margin-top: 8px;
      }

      summary {
        cursor: pointer;
        color: var(--muted);
      }

      .check-output {
        min-height: 0;
        max-height: 180px;
        margin-top: 8px;
        padding: 10px;
      }

      .badge {
        display: inline-block;
        min-width: 58px;
        margin-right: 8px;
        border-radius: 999px;
        padding: 2px 8px;
        background: #eef2f7;
        color: var(--muted);
        font-size: 12px;
        text-align: center;
      }

      .badge.ok {
        background: #dff5ef;
        color: var(--teal);
      }

      .badge.failed {
        background: #fde7e0;
        color: var(--coral);
      }

      @media (max-width: 820px) {
        .grid,
        .row,
        .status,
        .report-grid {
          grid-template-columns: 1fr;
        }

        h1 {
          font-size: 30px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <nav class="shell">
        <div class="brand">Octopus 🐙</div>
        <div class="links">
          <a href="./">Home</a>
          <a href="./pet.html">Pet</a>
          <a href="./quickstart.html">Install</a>
          <a href="https://github.com/dangoZhang/Octopus">GitHub</a>
        </div>
      </nav>
    </header>

    <main class="shell">
      <h1>Command Surface</h1>
      <div class="grid">
        <section class="panel stack">
          <h2>Run</h2>
          <label>State path
            <input id="state" value=".octopus/state.json" />
          </label>
          <label>Goal
            <textarea id="goal">build a clean-brain agent</textarea>
          </label>
          <div class="row">
            <label>Need
              <select id="need">
                <option value="observe">observe</option>
                <option value="verify">verify</option>
                <option value="compare">compare</option>
                <option value="reproduce">reproduce</option>
                <option value="remember">remember</option>
                <option value="recall">recall</option>
                <option value="forget">forget</option>
                <option value="execute">execute</option>
              </select>
            </label>
            <label>Target
              <input id="target" value="." />
            </label>
          </div>
          <label>Tentacle
            <select id="tentacle">
              <option value="swe-agent">swe-agent</option>
              <option value="computer-use-agent">computer-use-agent</option>
              <option value="bash-only">bash-only</option>
              <option value="repo-maintainer">repo-maintainer</option>
              <option value="json-feed">json-feed</option>
            </select>
          </label>
          <label>Bridge
            <input id="bridge" value="http://127.0.0.1:8765" />
          </label>
          <div class="toolbar">
            <button class="primary" type="button" id="build">Build</button>
            <button type="button" id="copy">Copy</button>
            <button type="button" id="reset">Reset</button>
          </div>
        </section>

        <section class="panel stack">
          <h2>Commands</h2>
          <pre><code id="commands"></code></pre>
          <div class="status">
            <div class="beat"><strong>Heartbeat</strong><span>octopus pet heartbeat</span></div>
            <div class="beat"><strong>Memory</strong><span>octopus beat 200</span></div>
            <div class="beat"><strong>Harness</strong><span>octopus evolve score</span></div>
          </div>
          <div class="toolbar states">
            <button type="button" data-state="heartbeat">Heartbeat</button>
            <button type="button" data-state="memory">Memory</button>
            <button type="button" data-state="harness">Harness</button>
            <button type="button" data-state="blocked">Blocked</button>
            <button type="button" data-state="success">Success</button>
          </div>
          <div class="toolbar">
            <button type="button" data-run="init">Init</button>
            <button type="button" data-run="install">Install</button>
            <button type="button" id="installGuide">Install Report</button>
            <button type="button" id="runChecks">Run Checks</button>
            <button type="button" data-run="chat">Chat</button>
            <button type="button" data-run="think">Think</button>
            <button type="button" data-run="need">Need</button>
            <button type="button" data-run="traces">Trace</button>
            <button type="button" data-run="provider">Provider</button>
            <button type="button" data-run="pet">Pet</button>
            <button type="button" data-run="doctor">Doctor</button>
            <button type="button" data-run="beat">Beat</button>
          </div>
          <div class="output">
            <h2>Output</h2>
            <pre><code id="output"></code></pre>
          </div>
          <div class="install-report stack">
            <h2>Install Report</h2>
            <div id="installReport" class="metric"><span>No report yet.</span></div>
          </div>
        </section>
      </div>
    </main>

    <script>
      const $ = (id) => document.getElementById(id);
      const shellQuote = (value) => `'${String(value).replaceAll("'", "'\\''")}'`;
      const defaultBridge = () => location.protocol.startsWith("http") ? location.origin : "http://127.0.0.1:8765";
      let currentPetState = "harness";
      let currentInstallReport = null;
      let currentCheckReport = null;

      function render(stateName = "harness") {
        currentPetState = stateName;
        const state = $("state").value.trim() || ".octopus/state.json";
        const goal = $("goal").value.trim() || "build a clean-brain agent";
        const need = $("need").value;
        const target = $("target").value.trim() || ".";
        const tentacle = $("tentacle").value;
        $("commands").textContent = [
          "cargo install --git https://github.com/dangoZhang/Octopus --locked --package octopus-core --bin octopus --force",
          "octopus providers",
          "octopus provider status",
          "octopus bridge",
          `octopus --state ${shellQuote(state)} init`,
          `octopus --state ${shellQuote(state)} install ${tentacle}`,
          `octopus --state ${shellQuote(state)} --json install ${tentacle}`,
          `octopus --json check ${tentacle}`,
          `octopus --state ${shellQuote(state)} chat ${shellQuote(goal)}`,
          `octopus --state ${shellQuote(state)} think ${tentacle} ${need} ${shellQuote(target)}`,
          `octopus --state ${shellQuote(state)} need ${need} ${shellQuote(target)}`,
          `octopus --state ${shellQuote(state)} traces`,
          `octopus --state ${shellQuote(state)} pet ${stateName}`,
          `octopus --state ${shellQuote(state)} doctor`,
          `octopus --state ${shellQuote(state)} beat 200`,
        ].join("\n");
      }

      function bridgeArgs(action, stateName = "harness") {
        const state = $("state").value.trim() || ".octopus/state.json";
        const goal = $("goal").value.trim() || "build a clean-brain agent";
        const need = $("need").value;
        const target = $("target").value.trim() || ".";
        const tentacle = $("tentacle").value;
        const base = ["--state", state];
        const args = {
          init: [...base, "init"],
          install: [...base, "install", tentacle],
          chat: [...base, "chat", goal],
          think: [...base, "think", tentacle, need, target],
          need: [...base, "need", need, target],
          traces: [...base, "traces"],
          provider: ["provider", "status"],
          pet: [...base, "pet", stateName],
          doctor: [...base, "doctor"],
          beat: [...base, "beat", "200"],
        };
        return args[action];
      }

      async function runBridgeJson(args) {
        const base = ($("bridge").value.trim() || defaultBridge()).replace(/\/$/, "");
        const response = await fetch(base + "/api/run", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ args }),
        });
        const result = await response.json();
        if (!result.ok) {
          throw new Error(result.stderr || result.stdout || "bridge command failed");
        }
        return JSON.parse(result.stdout);
      }

      async function runInstallReport() {
        const state = $("state").value.trim() || ".octopus/state.json";
        const tentacle = $("tentacle").value;
        $("installReport").textContent = "loading...";
        try {
          const report = await runBridgeJson(["--state", state, "--json", "install", tentacle]);
          currentInstallReport = report;
          currentCheckReport = null;
          renderInstallReport(report);
          $("output").textContent = JSON.stringify(report, null, 2);
        } catch (error) {
          $("installReport").textContent = String(error);
        }
      }

      async function runChecks() {
        if (!currentInstallReport || currentInstallReport.id !== $("tentacle").value) {
          await runInstallReport();
        }
        const tentacle = $("tentacle").value;
        try {
          const report = await runBridgeJson(["--json", "check", tentacle]);
          currentCheckReport = report;
          if (currentInstallReport) renderInstallReport(currentInstallReport);
          $("output").textContent = JSON.stringify(report, null, 2);
        } catch (error) {
          $("output").textContent = String(error);
        }
      }

      async function runSingleCheck(index) {
        if (!currentInstallReport || currentInstallReport.id !== $("tentacle").value) {
          await runInstallReport();
        }
        const tentacle = $("tentacle").value;
        try {
          const report = await runBridgeJson(["--json", "check", tentacle, String(index + 1)]);
          if (!currentCheckReport || currentCheckReport.id !== tentacle) {
            currentCheckReport = {
              id: tentacle,
              results: new Array((currentInstallReport.checks || []).length),
            };
          }
          currentCheckReport.results[index] = (report.results || [])[0];
          renderInstallReport(currentInstallReport);
          $("output").textContent = JSON.stringify(report, null, 2);
        } catch (error) {
          $("output").textContent = String(error);
        }
      }

      function renderInstallReport(report) {
        const root = $("installReport");
        root.className = "stack";
        root.textContent = "";
        root.appendChild(reportSummary(report));
        root.appendChild(reportList("Grants", report.grants || [], grantItem));
        root.appendChild(reportList("Checks", report.checks || [], checkItem));
        root.appendChild(reportList("Next", report.next || [], textItem));
      }

      function reportSummary(report) {
        const grid = document.createElement("div");
        grid.className = "report-grid";
        [
          ["Tentacle", `${report.id} · ${report.brain_kind}`],
          ["Needs", (report.needs || []).join(", ") || "none"],
          ["Runtimes", (report.runtimes || []).join(", ") || "none"],
          ["Surfaces", (report.evolution_surfaces || []).join(", ") || "none"],
        ].forEach(([label, value]) => {
          const metric = document.createElement("div");
          metric.className = "metric";
          const strong = document.createElement("strong");
          strong.textContent = label;
          const span = document.createElement("span");
          span.textContent = value;
          metric.append(strong, span);
          grid.appendChild(metric);
        });
        return grid;
      }

      function reportList(title, items, renderer) {
        const section = document.createElement("section");
        section.className = "stack";
        const heading = document.createElement("h2");
        heading.textContent = title;
        const list = document.createElement("ul");
        list.className = "report-list";
        if (!items.length) {
          const empty = document.createElement("li");
          empty.textContent = "none";
          list.appendChild(empty);
        } else {
          items.forEach((item, index) => list.appendChild(renderer(item, index)));
        }
        section.append(heading, list);
        return section;
      }

      function textItem(value) {
        const item = document.createElement("li");
        item.textContent = value;
        return item;
      }

      function checkItem(value, index) {
        const item = document.createElement("li");
        const result = currentCheckReport && currentCheckReport.results && currentCheckReport.results[index];
        if (!result) {
          const badge = document.createElement("span");
          badge.className = "badge";
          badge.textContent = "pending";
          const command = document.createElement("span");
          command.className = "check-command";
          command.textContent = value;
          item.append(badge, command, checkRunButton(index, "Run"));
          return item;
        }
        const badge = document.createElement("span");
        badge.className = result.status === "satisfied" ? "badge ok" : "badge failed";
        badge.textContent = result.status === "satisfied" ? "ok" : "failed";
        const command = document.createElement("span");
        command.className = "check-command";
        command.textContent = result.command || value;
        item.append(badge, command, checkRunButton(index, "Rerun"));
        item.appendChild(checkOutputDetails(result));
        return item;
      }

      function checkRunButton(index, label) {
        const button = document.createElement("button");
        button.type = "button";
        button.textContent = label;
        button.addEventListener("click", () => runSingleCheck(index));
        return button;
      }

      function checkOutputDetails(result) {
        const details = document.createElement("details");
        const summary = document.createElement("summary");
        summary.textContent = result.code === null ? "Output" : `Output · exit ${result.code}`;
        const pre = document.createElement("pre");
        pre.className = "check-output";
        const code = document.createElement("code");
        const stdout = (result.stdout || "").trim();
        const stderr = (result.stderr || "").trim();
        code.textContent = [
          stdout ? `stdout:\n${stdout}` : "",
          stderr ? `stderr:\n${stderr}` : "",
        ].filter(Boolean).join("\n\n") || "no output";
        pre.appendChild(code);
        details.append(summary, pre);
        return details;
      }

      function grantItem(grant) {
        const item = document.createElement("li");
        const status = grant.active ? "active" : "missing";
        item.textContent = `${status}: ${grant.command}`;
        if (!grant.active && grant.provider === "octopus" && grant.scope.startsWith("tool:")) {
          const button = document.createElement("button");
          button.type = "button";
          button.textContent = "Grant";
          button.addEventListener("click", async () => {
            const state = $("state").value.trim() || ".octopus/state.json";
            await runBridgeDirect(["--state", state, "oauth", grant.provider, grant.scope, ...grant.permissions], "grant");
            await runInstallReport();
          });
          item.appendChild(button);
        }
        return item;
      }

      async function runBridgeDirect(args, label) {
        const base = ($("bridge").value.trim() || defaultBridge()).replace(/\/$/, "");
        $("output").textContent = "running " + label + "...";
        const response = await fetch(base + "/api/run", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ args }),
        });
        const result = await response.json();
        $("output").textContent = [result.stdout, result.stderr].filter(Boolean).join("\n");
        if (!result.ok) throw new Error(result.stderr || "bridge command failed");
      }

      async function runBridge(action) {
        const args = bridgeArgs(action);
        if (!args) return;
        const base = ($("bridge").value.trim() || defaultBridge()).replace(/\/$/, "");
        $("output").textContent = "running " + action + "...";
        try {
          const response = await fetch(base + "/api/stream", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ args }),
          });
          if (!response.body) throw new Error("stream unavailable");
          $("output").textContent = "";
          const reader = response.body.getReader();
          const decoder = new TextDecoder();
          let buffer = "";
          while (true) {
            const { value, done } = await reader.read();
            if (done) break;
            buffer += decoder.decode(value, { stream: true });
            const parts = buffer.split("\n\n");
            buffer = parts.pop() || "";
            parts.forEach(handleStreamEvent);
          }
          if (buffer.trim()) handleStreamEvent(buffer);
        } catch (error) {
          $("output").textContent = String(error);
        }
      }

      function handleStreamEvent(block) {
        const lines = block.split("\n");
        const event = (lines.find((line) => line.startsWith("event:")) || "event: message").slice(6).trim();
        const raw = (lines.find((line) => line.startsWith("data:")) || "data: {}").slice(5).trim();
        let data = {};
        try {
          data = JSON.parse(raw);
        } catch {
          data = { text: raw };
        }
        if (event === "start") {
          $("output").textContent += "started\n";
        } else if (event === "stdout") {
          $("output").textContent += data.text + "\n";
        } else if (event === "stderr") {
          $("output").textContent += "[stderr] " + data.text + "\n";
        } else if (event === "done") {
          $("output").textContent += data.ok ? "done\n" : `failed (${data.code ?? "unknown"})\n`;
        }
      }

      $("build").addEventListener("click", () => render());
      $("copy").addEventListener("click", async () => {
        await navigator.clipboard.writeText($("commands").textContent);
      });
      $("reset").addEventListener("click", () => {
        $("state").value = ".octopus/state.json";
        $("goal").value = "build a clean-brain agent";
        $("need").value = "observe";
        $("target").value = ".";
        $("tentacle").value = "swe-agent";
        $("bridge").value = defaultBridge();
        $("output").textContent = "";
        $("installReport").className = "metric";
        $("installReport").innerHTML = "<span>No report yet.</span>";
        currentInstallReport = null;
        currentCheckReport = null;
        render();
      });
      $("installGuide").addEventListener("click", runInstallReport);
      $("runChecks").addEventListener("click", runChecks);
      document.querySelectorAll("[data-state]").forEach((button) => {
        button.addEventListener("click", () => render(button.dataset.state));
      });
      document.querySelectorAll("[data-run]").forEach((button) => {
        button.addEventListener("click", () => runBridge(button.dataset.run));
      });
      ["state", "goal", "need", "target", "tentacle", "bridge"].forEach((id) => {
        $(id).addEventListener("input", () => {
          currentInstallReport = null;
          currentCheckReport = null;
          render(currentPetState);
        });
      });
      $("bridge").value = defaultBridge();
      render();
    </script>
  </body>
</html>
